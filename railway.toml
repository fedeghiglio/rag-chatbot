# Railway deployment config for the FastAPI backend service.
# (The Streamlit frontend is deployed as a separate Railway service using
# Dockerfile.streamlit — see README "Deploy to Railway".)

[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"

[deploy]
# No startCommand on purpose: Railway falls back to the Dockerfile's CMD, which
# is a Python entrypoint that reads $PORT from the environment directly. This
# keeps the run command in one place (the Dockerfile).
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
